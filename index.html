<!DOCTYPE html>
<html lang="ro"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
/* ═══════════════════════════════════════════
   TASK MANAGER — style.css
   Light, clean, white background
═══════════════════════════════════════════ */

:root {
    /* ── Status colours — all high contrast, full cell fill ── */
    --s1-bg: #dbeafe;  --s1-tx: #1d4ed8;   /* 1-ME On Going      — blue   */
    --s2-bg: #d1fae5;  --s2-tx: #065f46;   /* 2-Others On Going  — green  */
    --s3-bg: #fef3c7;  --s3-tx: #92400e;   /* 3-Not Started      — amber  */
    --s4-bg: #fce7f3;  --s4-tx: #9d174d;   /* 4-Follow Up        — pink   */
    --s5-bg: #fee2e2;  --s5-tx: #b91c1c;   /* 5-Delayed          — red    */
    --s6-bg: #dcfce7;  --s6-tx: #166534;   /* Done               — green  */

    --bdr:       #e2e8f0;
    --bdr-dark:  #cbd5e1;
    --bg-head:   #f8fafc;
    --bg-hover:  #f1f5f9;
    --bg-drag:   #eff6ff;
    --txt:       #0f172a;
    --txt2:      #64748b;
    --accent:    #3b82f6;
    --accent-dk: #1d4ed8;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
    --shadow-md: 0 4px 20px rgba(0,0,0,.12);
    --r:         6px;
    --font:      'DM Sans', sans-serif;
    --mono:      'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: var(--font);
    background: #f1f5f9;
    color: var(--txt);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
}

/* ── HEADER ── */
.main-header {
    background: #fff;
    border-bottom: 1px solid var(--bdr);
    padding: 10px 0;
    position: sticky; top: 0; z-index: 30;
    box-shadow: var(--shadow-sm);
}
.header-content {
    width: 96%; margin: 0 auto;
    display: flex; justify-content: space-between; align-items: center;
}
.header-left  { display: flex; align-items: center; gap: 14px; }
.header-right { display: flex; align-items: center; }

h1 { font-size: 17px; font-weight: 700; color: var(--txt); letter-spacing: -.015em; }

.btn-main {
    display: flex; align-items: center; gap: 6px;
    background: var(--accent); color: #fff;
    border: none; padding: 8px 16px; border-radius: var(--r);
    font-size: 13px; font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: background .15s, transform .1s;
}
.btn-main:hover  { background: var(--accent-dk); }
.btn-main:active { transform: scale(.97); }

.btn-backup {
    display: flex; align-items: center; gap: 6px;
    background: #f1f5f9; color: var(--txt2);
    border: 1px solid var(--bdr); padding: 7px 13px;
    border-radius: var(--r); font-size: 12px;
    font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn-backup:hover { background: #e2e8f0; color: var(--txt); border-color: var(--bdr-dark); }
.btn-load { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
.btn-load:hover { background: #dcfce7; border-color: #86efac; }

.slicer-wrap  { display: flex; align-items: center; gap: 8px; }
.slicer-label { font-size: 11px; font-weight: 600; color: var(--txt2); }
.slicer       { display: flex; background: #f1f5f9; padding: 3px; border-radius: 8px; gap: 2px; }
.slicer-opt   {
    border: none; background: none;
    padding: 5px 13px; font-size: 11px; font-weight: 600;
    border-radius: 6px; color: var(--txt2);
    cursor: pointer; transition: all .15s; font-family: var(--font);
}
.slicer-opt.active { background: #fff; color: var(--accent); box-shadow: var(--shadow-sm); }
.slicer-divider { width: 1px; height: 28px; background: var(--bdr); margin: 0 6px; }

/* ── APP CONTAINER ── */
.app-container  { width: 96%; margin: 16px auto; }
.grid-container {
    background: #fff;
    border: 1px solid var(--bdr);
    border-radius: 8px; overflow: hidden;
    box-shadow: var(--shadow-sm);
    overflow-x: auto;
}

/* ── TABLE ── */
table { width: 100%; border-collapse: collapse; table-layout: fixed; }

th {
    background: var(--bg-head);
    border-bottom: 2px solid var(--bdr-dark);
    border-right: 1px solid var(--bdr);
    padding: 0;
    font-size: 10px; font-weight: 700;
    color: var(--txt2); letter-spacing: .06em; text-transform: uppercase;
    text-align: left; position: relative;
    cursor: pointer; user-select: none; white-space: nowrap;
}
th:last-child { border-right: none; }
.th-inner { display: flex; align-items: center; gap: 4px; padding: 9px 10px; }
th:hover .th-inner { color: var(--txt); }
.sort-arrow::after       { content:' ↕'; opacity:.3; font-size:9px; }
.sort-arrow.asc::after   { content:' ↑'; opacity:1; color:var(--accent); }
.sort-arrow.desc::after  { content:' ↓'; opacity:1; color:var(--accent); }

/* Column widths */
.col-name    { width: 300px; min-width: 160px; }
.col-comment { min-width: 160px; }
.col-details { width: 38px; min-width: 38px; cursor: default !important; }
.col-status  { width: 172px; min-width: 140px; }
.col-date    { width: 132px; min-width: 110px; }
.col-timeleft{ width: 108px; min-width: 90px; cursor: default !important; }
.col-drag    { width: 30px;  min-width: 30px; cursor: default !important; }
.col-delete  { width: 36px;  min-width: 36px; cursor: default !important; }

/* Resizer */
.resizer {
    position: absolute; right: 0; top: 0;
    width: 5px; height: 100%; cursor: col-resize; z-index: 2;
}
.resizer:hover, .resizer.active { background: var(--accent); opacity: .5; }

/* ── ROWS ── */
td {
    border-bottom: 1px solid var(--bdr);
    border-right: 1px solid var(--bdr);
    vertical-align: middle; padding: 0;
}
td:last-child { border-right: none; }

tr.row-task td:first-child { border-left: 3px solid #3b82f6; }
tr.row-sub1 td:first-child { border-left: 3px solid #8b5cf6; }
tr.row-sub2 td:first-child { border-left: 3px solid #94a3b8; }

tr:hover td { background: var(--bg-hover); }

/* Done — no strikethrough, just slightly muted */
tr.row-done td { opacity: .62; }

/* Drag states */
tr.dragging { opacity: .35; background: #eff6ff; }
tr.drag-over td { border-top: 2px solid var(--accent) !important; background: var(--bg-drag); }

/* ── CELL: NAME ── */
.cell-name {
    display: flex; align-items: flex-start;
    gap: 4px; padding: 5px 6px;
}

.check-box {
    width: 17px; height: 17px; flex-shrink: 0;
    border: 1.5px solid #94a3b8; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin-top: 2px;
    transition: all .15s; background: #fff;
}
.check-box:hover { border-color: var(--accent); }
.check-box.checked { background: #22c55e; border-color: #22c55e; }
.check-box.checked::after {
    content: '';
    width: 9px; height: 5px;
    border-left: 2px solid #fff; border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
    display: block;
}

/* Toggle / expand — larger & highlighted when has children */
.toggle-btn {
    flex-shrink: 0;
    width: 20px; height: 20px;
    border: 1.5px solid #cbd5e1; border-radius: 4px;
    background: #f8fafc; color: var(--txt2);
    font-size: 14px; font-weight: 700; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; margin-top: 2px;
}
.toggle-btn:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

/* Bigger, bolder, accented when parent has children */
.toggle-btn.has-children {
    width: 26px; height: 26px;
    font-size: 18px; font-weight: 800;
    border: 2px solid var(--accent);
    color: var(--accent); background: #eff6ff;
    box-shadow: 0 1px 5px rgba(59,130,246,.25);
    border-radius: 6px;
}
.toggle-btn.has-children:hover {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 8px rgba(59,130,246,.4);
}
.toggle-placeholder { width: 20px; height: 20px; flex-shrink: 0; }

.name-wrap { flex: 1; min-width: 0; }

textarea {
    width: 100%; background: transparent; border: none;
    color: var(--txt); font-family: var(--font);
    font-size: 13px; resize: none; outline: none;
    padding: 2px 0; display: block; line-height: 1.5; overflow: hidden;
}
textarea::placeholder  { color: #cbd5e1; }
textarea:focus { background: #f8fafc; border-radius: 3px; }

.name-area           { font-weight: 500; }
.row-task .name-area { font-weight: 700; font-size: 14px; color: #0f172a; }
.row-sub1 .name-area { font-size: 13px; }
.row-sub2 .name-area { font-size: 12px; font-style: italic; color: var(--txt2); }

.btn-add-child {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px dashed #94a3b8; border-radius: 4px;
    background: none; color: var(--txt2);
    font-size: 14px; cursor: pointer; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    margin-top: 2px; transition: all .15s;
}
.btn-add-child:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

/* ── CELL: COMMENT ── */
.comment-area {
    font-size: 12px; color: var(--txt2);
    padding: 7px 10px; font-weight: 400;
}
/* No placeholder until focused */
.comment-area::placeholder  { color: transparent; }
.comment-area:focus::placeholder { color: #cbd5e1; }

/* ── CELL: DETAILS BUTTON ── */
.btn-details {
    display: flex; align-items: center; justify-content: center;
    width: 100%; min-height: 36px; height: 100%;
    background: none; border: none; cursor: pointer;
    color: #cbd5e1; transition: color .15s;
}
.btn-details:hover       { color: var(--accent); }
.btn-details.has-content { color: #f59e0b; }

/* ── CELL: STATUS ── */
.status-select {
    width: calc(100% - 8px); margin: 4px;
    border: none; border-radius: 5px;
    font-family: var(--font); font-size: 11px; font-weight: 700;
    padding: 6px 8px; cursor: pointer;
    outline: none; appearance: none; -webkit-appearance: none;
    text-align: left; letter-spacing: .01em;
}
.status-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

.status-select.s1 { background: var(--s1-bg); color: var(--s1-tx); }
.status-select.s2 { background: var(--s2-bg); color: var(--s2-tx); }
.status-select.s3 { background: var(--s3-bg); color: var(--s3-tx); }
.status-select.s4 { background: var(--s4-bg); color: var(--s4-tx); }
.status-select.s5 { background: var(--s5-bg); color: var(--s5-tx); }
.status-select.s6 { background: var(--s6-bg); color: var(--s6-tx); }

/* ── CELL: DATE ── */
.date-input {
    width: 100%; background: transparent; border: none;
    color: var(--txt2); font-family: var(--mono);
    font-size: 12px; padding: 8px 10px;
    cursor: pointer; outline: none;
}
.date-input:focus { background: #f8fafc; color: var(--txt); }

/* ── CELL: TIME LEFT ── */
.time-cell {
    padding: 6px 10px; font-family: var(--mono);
    font-size: 11px; color: var(--txt2); white-space: nowrap;
}
.time-ok    { color: #16a34a; font-weight: 600; }
.time-warn  { color: #d97706; font-weight: 600; }
.time-late  { color: #dc2626; font-weight: 700; }
.time-today { color: #ea580c; font-weight: 700; }

/* ── CELL: DRAG HANDLE ── */
.drag-handle {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 100%; min-height: 36px;
    cursor: grab; color: #cbd5e1;
    font-size: 15px; user-select: none; transition: color .15s;
}
.drag-handle:hover  { color: var(--accent); }
.drag-handle:active { cursor: grabbing; }

/* ── CELL: DELETE ── */
.btn-delete {
    display: flex; align-items: center; justify-content: center;
    width: 100%; height: 100%; min-height: 36px;
    background: none; border: none; cursor: pointer;
    color: #cbd5e1; font-size: 14px; transition: color .15s;
}
.btn-delete:hover { color: #ef4444; }

/* ═══════════════════════════════════════════
   DETAILS MODAL (centered popup)
═══════════════════════════════════════════ */

.details-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 100;
    background: rgba(15,23,42,.45);
    backdrop-filter: blur(3px);
    align-items: center; justify-content: center;
    padding: 20px;
}
.details-overlay.open { display: flex; }

.details-modal {
    background: #fff;
    border: 1px solid var(--bdr);
    border-radius: 14px;
    box-shadow: var(--shadow-md), 0 0 0 1px rgba(0,0,0,.04);
    width: min(900px, 100%);
    max-height: 90vh;
    display: flex; flex-direction: column;
    animation: modalIn .22s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
}
@keyframes modalIn {
    from { opacity: 0; transform: scale(.95) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* Modal header */
.dm-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--bdr);
    background: var(--bg-head);
    flex-shrink: 0;
}
.dm-title {
    font-size: 15px; font-weight: 700; color: var(--txt);
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding-right: 12px;
}
.dm-close {
    width: 28px; height: 28px; border-radius: 50%;
    border: none; background: #f1f5f9; color: var(--txt2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .15s; flex-shrink: 0;
}
.dm-close:hover { background: #fee2e2; color: #ef4444; }

/* Modal body — two columns */
.dm-body {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
    flex: 1; overflow: hidden;
}
.dm-col {
    overflow-y: auto; padding: 0;
    border-right: 1px solid var(--bdr);
}
.dm-col:last-child { border-right: none; }

.dm-section {
    padding: 18px 20px;
    border-bottom: 1px solid var(--bdr);
}
.dm-section:last-child { border-bottom: none; }
.dm-section-photos { flex: 1; }

.dm-section-title {
    display: flex; align-items: center; gap: 7px;
    font-size: 10px; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase;
    color: var(--txt2); margin-bottom: 12px;
}

/* Comment history */
.comment-history {
    max-height: 260px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 12px;
}
.no-history { font-size: 12px; color: #94a3b8; font-style: italic; }

.comment-entry {
    background: #f8fafc; border: 1px solid var(--bdr);
    border-radius: 8px; padding: 10px 12px;
}
.comment-entry-ts   { font-size: 10px; font-family: var(--mono); color: #94a3b8; margin-bottom: 4px; }
.comment-entry-text { font-size: 13px; color: var(--txt); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }

.new-comment-row { display: flex; gap: 8px; align-items: flex-start; }
.new-comment-input {
    flex: 1; border: 1px solid var(--bdr); border-radius: 8px;
    padding: 9px 12px; font-size: 13px; font-family: var(--font);
    resize: none; color: var(--txt); background: #fff;
    outline: none; min-height: 60px; transition: border-color .15s;
}
.new-comment-input:focus { border-color: var(--accent); }
.new-comment-input::placeholder { color: #94a3b8; }

.btn-add-comment {
    display: flex; align-items: center; gap: 5px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px; padding: 9px 14px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    white-space: nowrap; font-family: var(--font);
    transition: background .15s; flex-shrink: 0;
}
.btn-add-comment:hover { background: var(--accent-dk); }

/* Detailed notes */
.dm-notes {
    width: 100%; border: 1px solid var(--bdr); border-radius: 8px;
    padding: 10px 12px; font-size: 13px; font-family: var(--font);
    color: var(--txt); resize: vertical; min-height: 120px;
    outline: none; transition: border-color .15s; background: #fff; line-height: 1.6;
}
.dm-notes:focus { border-color: var(--accent); }
.dm-notes::placeholder { color: #94a3b8; }

/* Photos grid */
.photos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 12px;
}
.photo-thumb {
    aspect-ratio: 1; border-radius: 8px; object-fit: cover; width: 100%;
    border: 1px solid var(--bdr); cursor: pointer; transition: opacity .15s, transform .15s;
    display: block;
}
.photo-thumb:hover { opacity: .88; transform: scale(1.02); }

.file-chip {
    display: flex; align-items: center; gap: 6px;
    background: #f1f5f9; border: 1px solid var(--bdr);
    border-radius: 8px; padding: 8px 10px;
    font-size: 12px; color: var(--txt); cursor: pointer;
    transition: background .15s; overflow: hidden;
    grid-column: span 1;
}
.file-chip:hover { background: var(--bg-hover); }
.file-chip-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

.btn-upload {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #f8fafc; border: 1.5px dashed #94a3b8;
    border-radius: 8px; padding: 10px 16px;
    font-size: 12px; font-weight: 600; color: var(--txt2);
    cursor: pointer; transition: all .15s; width: 100%;
    font-family: var(--font);
}
.btn-upload:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

/* Responsive modal */
@media (max-width: 680px) {
    .dm-body { grid-template-columns: 1fr; }
    .dm-col  { border-right: none; border-bottom: 1px solid var(--bdr); }
    .dm-col:last-child { border-bottom: none; }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar       { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    </style>
</head>
<body>

<header class="main-header">
    <div class="header-content">
        <div class="header-left">
            <button id="addTaskBtn" class="btn-main">
                <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                    <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                </svg>
                Add Task
            </button>
            <button class="btn-backup" onclick="saveBackup()" title="Save backup to PC">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 12l-4-4h2.5V3h3v5H12L8 12zM2 14h12v1.5H2V14z"/>
                </svg>
                Save Backup
            </button>
            <label class="btn-backup btn-load" title="Load backup from PC">
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 4l4 4H9.5v5h-3V8H4L8 4zM2 14h12v1.5H2V14z"/>
                </svg>
                Load Backup
                <input type="file" id="backupFileInput" accept=".json" onchange="loadBackup(event)" style="display:none">
            </label>
            <h1 id="workspaceTitle">💼 Job Tasks</h1>
        </div>
        <div class="header-right">
            <div class="slicer-wrap">
                <span class="slicer-label">Workspace:</span>
                <div class="slicer" id="workspaceSlicer">
                    <button class="slicer-opt active" data-value="job">💼 Job</button>
                    <button class="slicer-opt" data-value="personal">🏠 Personale</button>
                </div>
            </div>
            <div class="slicer-divider"></div>
            <div class="slicer-wrap">
                <span class="slicer-label">View:</span>
                <div class="slicer" id="statusSlicer">
                    <button class="slicer-opt active" data-value="all">All</button>
                    <button class="slicer-opt" data-value="todo">Active</button>
                    <button class="slicer-opt" data-value="done">Done</button>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="app-container">
    <div class="grid-container">
        <table id="taskTable">
            <thead>
                <tr>
                    <th class="resizable col-name" data-col="0">
                        <span class="th-inner">TASK NAME <span class="sort-arrow" data-col="0"></span></span>
                        <div class="resizer"></div>
                    </th>
                    <th class="resizable col-comment" data-col="1">
                        <span class="th-inner">COMMENT <span class="sort-arrow" data-col="1"></span></span>
                        <div class="resizer"></div>
                    </th>
                    <th class="col-details"></th>
                    <th class="resizable col-status" data-col="2">
                        <span class="th-inner">STATUS <span class="sort-arrow" data-col="2"></span></span>
                        <div class="resizer"></div>
                    </th>
                    <th class="resizable col-date" data-col="3">
                        <span class="th-inner">DUE DATE <span class="sort-arrow" data-col="3"></span></span>
                        <div class="resizer"></div>
                    </th>
                    <th class="col-timeleft">TIME LEFT</th>
                    <th class="col-drag"></th>
                    <th class="col-delete"></th>
                </tr>
            </thead>

</main>

                        placeholder="Write detailed notes, context, links…"

                            accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt,.zip"

<script>
/* ═══════════════════════════════════════════════
   TASK MANAGER — script.js
   Features:
   • 5 status colours (full cell)
   • No strikethrough on Done rows
   • Expand button bigger + highlighted when parent has children
   • Drag & drop row reordering
   • Auto-adjust name column on load
   • Pics/Details modal (centered popup)
   • Comment history with timestamps
   • Photos & Files upload
   • Detailed notes
═══════════════════════════════════════════════ */

const STORAGE_KEY_JOB      = 'taskManager_job';
const STORAGE_KEY_PERSONAL = 'taskManager_personal';
let currentWorkspace = 'job';  // 'job' | 'personal'

/* ── STATUS CONFIG ── */
const STATUS_LIST = [
    { value: '1-ME On Going',     label: '1 · ME: On Going',     cls: 's1' },
    { value: '2-Others On Going', label: '2 · Others: On Going', cls: 's2' },
    { value: '3-Not Started',     label: '3 · Not Started',      cls: 's3' },
    { value: '4-Follow Up',       label: '4 · Follow Up',        cls: 's4' },
    { value: '5-Delayed',         label: '5 · Delayed',          cls: 's5' },
    { value: 'Done',              label: '✓  Done',               cls: 's6' },
];

function getStatusCls(val) {
    const s = STATUS_LIST.find(s => s.value === val);
    return s ? s.cls : 's3';
}

/* ── STATE ── */
let tasks         = [];
let collapsedSet  = new Set();
let currentFilter = 'all';
let sortSettings  = { col: null, dir: 1 };
let activeTaskId  = null;   // currently open modal task

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
    initSortHeaders();
    initResizers();
    initSlicer();
    initWorkspaceSlicer();
    autoAdjustNameCol();
    


 sortSettings = { col: 2, dir: 1 }
 // Default filter: Active
    currentFilter = 'todo';
    document.querySelectorAll('#statusSlicer .slicer-opt').forEach(b => b.classList.remove('active'));
    document.querySelector('#statusSlicer .slicer-opt[data-value="todo"]').classList.add('active');

    document.getElementById('addTaskBtn').addEventListener('click', addTopTask);
    loadData();
    renderTasks();
});

/* ══════════════════════════════════════════════
   STORAGE
══════════════════════════════════════════════ */
function loadData() {
    try {
        const key = currentWorkspace === 'job' ? STORAGE_KEY_JOB : STORAGE_KEY_PERSONAL;
        const raw = localStorage.getItem(key);
        tasks = raw ? JSON.parse(raw) : [];

        // Migrate old shapes
        tasks.forEach(t => {
            if (!t.status)           t.status          = t.responsible || '3-Not Started';
            if (!t.commentHistory)   t.commentHistory  = [];
            if (!t.photos)           t.photos          = [];
            if (!t.notes)            t.notes           = '';
            if (!t.hasOwnProperty('order')) t.order    = t.id;
            // Seed history from legacy comment field (one-time)
            if (t.comment && t.comment.trim() && t.commentHistory.length === 0) {
                t.commentHistory.push({ text: t.comment, ts: t.id });
            }
        });
        // Default: collapse all top-level tasks
        tasks.filter(t => !t.parentId).forEach(t => collapsedSet.add(t.id));
    } catch(e) {
        tasks = [];
    }
}

function saveData() {
    const key = currentWorkspace === 'job' ? STORAGE_KEY_JOB : STORAGE_KEY_PERSONAL;
    localStorage.setItem(key, JSON.stringify(tasks));
}
function saveAndRender()  { saveData(); renderTasks(); }

/* ══════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════ */
function renderTasks() {
    const tbody = document.getElementById('taskBody');
    tbody.innerHTML = '';

    const rows = buildVisibleList();

    if (rows.length === 0) {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="8" style="text-align:center;padding:48px;color:#94a3b8;font-size:13px">
            No tasks yet — click <strong>Add Task</strong> to get started.</td>`;
        tbody.appendChild(tr);
    } else {
        rows.forEach(t => buildRow(t, tbody));
    }

    // Sort arrow indicators
    document.querySelectorAll('.sort-arrow').forEach(el => {
        const c = parseInt(el.dataset.col);
        el.className = 'sort-arrow';
        if (sortSettings.col === c) el.classList.add(sortSettings.dir === 1 ? 'asc' : 'desc');
    });

    initDragDrop();
}

function buildVisibleList() {
    const colKeys = ['name','comment','status','dueDate'];
    let tops = tasks.filter(t => !t.parentId).sort((a,b) => a.order - b.order);

    if (sortSettings.col !== null) {
        const key = colKeys[sortSettings.col];
        tops = tops.sort((a,b) =>
            (a[key]||'').toString().toLowerCase()
                .localeCompare((b[key]||'').toString().toLowerCase()) * sortSettings.dir
        );
    }

    const result = [];

    tops.forEach(task => {
        if (!matchFilter(task)) return;
        result.push(task);

        if (collapsedSet.has(task.id)) return;

        const subs1 = tasks.filter(t => t.parentId === task.id).sort((a,b) => a.order - b.order);
        subs1.forEach(s1 => {
            if (!matchFilter(s1)) return;
            result.push(s1);

            if (collapsedSet.has(s1.id)) return;
            const subs2 = tasks.filter(t => t.parentId === s1.id).sort((a,b) => a.order - b.order);
            subs2.forEach(s2 => { if (matchFilter(s2)) result.push(s2); });
        });
    });

    return result;
}

function matchFilter(t) {
    if (currentFilter === 'done') return  t.done;
    if (currentFilter === 'todo') return !t.done;
    return true;
}

/* ══════════════════════════════════════════════
   BUILD ROW
══════════════════════════════════════════════ */
function buildRow(task, tbody) {
    const tr = document.createElement('tr');
    tr.dataset.id = task.id;

    const lvlCls = ['row-task','row-sub1','row-sub2'][task.level] || 'row-sub2';
    tr.className = lvlCls;
    if (task.done) tr.classList.add('row-done');

    const indent      = task.level * 22;
    const hasChildren = tasks.some(t => t.parentId === task.id);
    const collapsed   = collapsedSet.has(task.id);
    const canParent   = task.level < 2;

    const hasDetails  = (task.commentHistory?.length > 0)
                     || (task.photos?.length > 0)
                     || !!task.notes?.trim();

    // ── NAME CELL ──
    let toggleHtml;
    if (canParent) {
        const hc = hasChildren ? ' has-children' : '';
        toggleHtml = `<button class="toggle-btn${hc}"
            onclick="toggleCollapse(${task.id})"
            title="${collapsed ? 'Expand' : 'Collapse'}">${collapsed ? '+' : '−'}</button>`;
    } else {
        toggleHtml = `<div class="toggle-placeholder"></div>`;
    }

    const tdName = document.createElement('td');
    tdName.innerHTML = `
        <div class="cell-name">
            <div class="check-box ${task.done ? 'checked' : ''}"
                onclick="toggleDone(${task.id})" title="Mark done/undone"></div>
            ${toggleHtml}
            <div class="name-wrap" style="padding-left:${indent}px">
                <textarea class="name-area" rows="1"
                    placeholder="Task name…"
                    onchange="updateField(${task.id},'name',this.value)"
                    oninput="autoResize(this)"
                >${esc(task.name)}</textarea>
            </div>
            ${canParent
                ? `<button class="btn-add-child"
                    onclick="addChild(${task.id},${task.level})"
                    title="Add sub-task">+</button>`
                : ''}
        </div>`;

    // ── COMMENT CELL ──
    const latestCmt = task.commentHistory?.length
        ? task.commentHistory[task.commentHistory.length - 1].text
        : (task.comment || '');
    const tdComment = document.createElement('td');
    tdComment.innerHTML = `<textarea class="comment-area" rows="1"
        onchange="updateComment(${task.id},this.value)"
        oninput="autoResize(this)">${esc(latestCmt)}</textarea>`;

    // ── DETAILS BUTTON ──
    const tdDetails = document.createElement('td');
    tdDetails.innerHTML = `<button class="btn-details ${hasDetails ? 'has-content' : ''}"
        onclick="openModal(${task.id})" title="Pics / Details">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 3a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm1 7H7V7h2v4z"/>
        </svg>
    </button>`;

    // ── STATUS CELL ──
    const sCls = task.done ? 's6' : getStatusCls(task.status);
    const opts = STATUS_LIST.map(s =>
        `<option value="${s.value}" ${task.status === s.value ? 'selected' : ''}>${s.label}</option>`
    ).join('');
    const tdStatus = document.createElement('td');
    tdStatus.innerHTML = `<select class="status-select ${sCls}"
        onchange="updateStatus(${task.id},this)">${opts}</select>`;

    // ── DATE CELL ──
    const tdDate = document.createElement('td');
    tdDate.innerHTML = `<input type="date" class="date-input"
        value="${task.dueDate || ''}"
        onchange="updateField(${task.id},'dueDate',this.value)">`;

    // ── TIME LEFT ──
    const tdTime = document.createElement('td');
    tdTime.innerHTML = `<div class="time-cell">${timeLeft(task.dueDate, task.done)}</div>`;

    // ── DRAG HANDLE ──
    const tdDrag = document.createElement('td');
    tdDrag.innerHTML = `<div class="drag-handle" draggable="true" title="Drag to reorder">⠿</div>`;

    // ── DELETE ──
    const tdDel = document.createElement('td');
    tdDel.innerHTML = `<button class="btn-delete" onclick="deleteTask(${task.id})" title="Delete">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
            <path d="M6 2a1 1 0 0 0-1 1v.5H2.5a.5.5 0 0 0 0 1h.5l.5 9A1.5 1.5 0 0 0 5 15h6
            a1.5 1.5 0 0 0 1.5-1.5l.5-9h.5a.5.5 0 0 0 0-1H11V3a1 1 0 0 0-1-1H6zm1 1h2v.5H7V3z
            M4.5 5h7l-.5 8.5a.5.5 0 0 1-.5.5H5.5a.5.5 0 0 1-.5-.5L4.5 5z"/>
        </svg>
    </button>`;

    [tdName, tdComment, tdDetails, tdStatus, tdDate, tdTime, tdDrag, tdDel]
        .forEach(td => tr.appendChild(td));
    tbody.appendChild(tr);

    tr.querySelectorAll('textarea').forEach(autoResize);
}

/* ══════════════════════════════════════════════
   TASK MUTATIONS
══════════════════════════════════════════════ */
function addTopTask() {
    const id = Date.now();
    tasks.push({
        id, parentId: null, level: 0,
        name: '', comment: '', status: '3-Not Started',
        dueDate: '', done: false,
        commentHistory: [], photos: [], notes: '',
        order: id
    });
    saveAndRender();
    // Focus new row name input
    setTimeout(() => {
        const rows = document.querySelectorAll('#taskBody tr');
        if (rows.length) {
            const ta = rows[rows.length - 1].querySelector('textarea.name-area');
            if (ta) { ta.focus(); }
        }
    }, 40);
}

function addChild(parentId, parentLevel) {
    const id = Date.now();
    tasks.push({
        id, parentId, level: parentLevel + 1,
        name: '', comment: '', status: '3-Not Started',
        dueDate: '', done: false,
        commentHistory: [], photos: [], notes: '',
        order: id
    });
    collapsedSet.delete(parentId);
    saveAndRender();
}

function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done   = !t.done;
    t.status = t.done ? 'Done' : '3-Not Started';
    saveAndRender();
}

function updateField(id, field, value) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t[field] = value;
    saveData();
    if (field === 'dueDate') renderTasks(); // refresh time-left
}

function updateComment(id, value) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.comment = value;
    saveData();
    // Note: adding to history happens explicitly via the modal
}

function updateStatus(id, sel) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.status = sel.value;
    t.done   = (sel.value === 'Done');
    sel.className = 'status-select ' + (t.done ? 's6' : getStatusCls(t.status));
    const row = sel.closest('tr');
    if (row) {
        row.classList.toggle('row-done', t.done);
        const cb = row.querySelector('.check-box');
        if (cb) cb.classList.toggle('checked', t.done);
    }
    saveData();
}

function deleteTask(id) {
    if (!confirm('Delete this task and all its sub-tasks?')) return;
    const del = new Set();
    const collect = tid => {
        del.add(tid);
        tasks.filter(t => t.parentId === tid).forEach(c => collect(c.id));
    };
    collect(id);
    tasks = tasks.filter(t => !del.has(t.id));
    collapsedSet.delete(id);
    if (activeTaskId && del.has(activeTaskId)) closeDetailsModal();
    saveAndRender();
}

/* ══════════════════════════════════════════════
   COLLAPSE
══════════════════════════════════════════════ */
function toggleCollapse(id) {
    collapsedSet.has(id) ? collapsedSet.delete(id) : collapsedSet.add(id);
    renderTasks();
}

/* ══════════════════════════════════════════════
   SORT
══════════════════════════════════════════════ */
function initSortHeaders() {
    document.querySelectorAll('th[data-col]').forEach(th => {
        th.addEventListener('click', e => {
            if (e.target.classList.contains('resizer')) return;
            const col = parseInt(th.dataset.col);
            if (sortSettings.col === col) sortSettings.dir *= -1;
            else { sortSettings.col = col; sortSettings.dir = 1; }
            renderTasks();
        });
    });
}

/* ══════════════════════════════════════════════
   FILTER (slicer)
══════════════════════════════════════════════ */
function initWorkspaceSlicer() {
    document.querySelectorAll('#workspaceSlicer .slicer-opt').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('#workspaceSlicer .slicer-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentWorkspace = btn.dataset.value;
            // Reset status filter when switching workspace
            document.querySelectorAll('#statusSlicer .slicer-opt').forEach(b => b.classList.remove('active'));
            document.querySelector('#statusSlicer .slicer-opt[data-value="all"]').classList.add('active');
            currentFilter = 'todo';
            // Update title
            const title = document.getElementById('workspaceTitle');
            if (title) title.textContent = currentWorkspace === 'job' ? '💼 Job Tasks' : '🏠 Personale';
            // Close modal if open
            closeDetailsModal();
            // Reload tasks for new workspace
            collapsedSet.clear();
            sortSettings = { col: null, dir: 1 };
            loadData();
            renderTasks();
        });
    });
}

function initSlicer() {
    document.querySelectorAll('.slicer-opt').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.slicer-opt').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.value;
            renderTasks();
        });
    });
}

/* ══════════════════════════════════════════════
   COLUMN RESIZE
══════════════════════════════════════════════ */
function initResizers() {
    document.querySelectorAll('th.resizable').forEach(th => {
        const rz = th.querySelector('.resizer');
        if (!rz) return;
        let startX, startW;
        rz.addEventListener('mousedown', e => {
            e.preventDefault();
            startX = e.pageX; startW = th.offsetWidth;
            rz.classList.add('active');
            const move = e => { th.style.width = Math.max(80, startW + e.pageX - startX) + 'px'; };
            const up   = () => { rz.classList.remove('active'); document.removeEventListener('mousemove', move); };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up, { once: true });
        });
    });
}

/* ══════════════════════════════════════════════
   AUTO-ADJUST NAME COLUMN
══════════════════════════════════════════════ */
function autoAdjustNameCol() {
    const th = document.querySelector('th.col-name');
    if (!th) return;
    th.style.width = Math.max(200, Math.min(500, Math.round(window.innerWidth * 0.30))) + 'px';
}

/* ══════════════════════════════════════════════
   DRAG & DROP ROW REORDER
══════════════════════════════════════════════ */
let dragId = null;

function initDragDrop() {
    const tbody = document.getElementById('taskBody');

    tbody.querySelectorAll('.drag-handle').forEach(handle => {
        const row = handle.closest('tr');
        const id  = parseInt(row.dataset.id);

        handle.addEventListener('dragstart', e => {
            dragId = id;
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', String(id));
            setTimeout(() => row.classList.add('dragging'), 0);
        });
        handle.addEventListener('dragend', () => {
            row.classList.remove('dragging');
            tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
            dragId = null;
        });
    });

    tbody.querySelectorAll('tr').forEach(row => {
        row.addEventListener('dragover', e => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            const tid = parseInt(row.dataset.id);
            if (tid === dragId) return;
            tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
            row.classList.add('drag-over');
        });
        row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
        row.addEventListener('drop', e => {
            e.preventDefault();
            const targetId  = parseInt(row.dataset.id);
            if (!dragId || dragId === targetId) return;

            const src = tasks.find(t => t.id === dragId);
            const tgt = tasks.find(t => t.id === targetId);
            if (!src || !tgt) return;
            if (src.parentId !== tgt.parentId) {
                row.classList.remove('drag-over');
                return; // only reorder within same level
            }

            // Recompute order among siblings
            const siblings = tasks
                .filter(t => t.parentId === src.parentId)
                .sort((a,b) => a.order - b.order);
            const without   = siblings.filter(t => t.id !== dragId);
            let   tgtIdx    = without.findIndex(t => t.id === targetId);
            // Insert after target if mouse is in lower half
            const rect = row.getBoundingClientRect();
            if (e.clientY > rect.top + rect.height / 2) tgtIdx++;
            without.splice(tgtIdx, 0, src);
            without.forEach((t, i) => { t.order = i * 10; });

            row.classList.remove('drag-over');
            saveAndRender();
        });
    });
}

/* ══════════════════════════════════════════════
   TIME LEFT
══════════════════════════════════════════════ */
function timeLeft(dateStr, done) {
    if (!dateStr) return '<span style="color:#cbd5e1">—</span>';
    if (done)     return '<span style="color:#22c55e;font-weight:600">Done ✓</span>';
    const today = new Date(); today.setHours(0,0,0,0);
    const due   = new Date(dateStr);
    const diff  = Math.ceil((due - today) / 86400000);
    if (diff <  0) return `<span class="time-late">−${Math.abs(diff)}d late</span>`;
    if (diff === 0) return `<span class="time-today">Today!</span>`;
    if (diff <= 3) return `<span class="time-warn">${diff}d left</span>`;
    return                `<span class="time-ok">${diff}d left</span>`;
}

/* ══════════════════════════════════════════════
   DETAILS MODAL
══════════════════════════════════════════════ */
function openModal(id) {
    activeTaskId = id;
    const t = tasks.find(t => t.id === id);
    if (!t) return;

    document.getElementById('dmTitle').textContent         = t.name || 'Untitled Task';
    document.getElementById('newCommentInput').value       = '';
    document.getElementById('dmNotes').value               = t.notes || '';

    renderCommentHistory(t);
    renderPhotosGrid(t);

    document.getElementById('detailsOverlay').classList.add('open');
    setTimeout(() => document.getElementById('newCommentInput').focus(), 180);
}

function closeDetailsModal() {
    document.getElementById('detailsOverlay').classList.remove('open');
    activeTaskId = null;
    renderTasks(); // refresh "has-content" indicator
}

function overlayClick(e) {
    if (e.target === document.getElementById('detailsOverlay')) closeDetailsModal();
}

// Escape key closes modal
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetailsModal();
});

/* ── Comments ── */
function renderCommentHistory(t) {
    const box = document.getElementById('commentHistory');
    if (!t.commentHistory?.length) {
        box.innerHTML = '<p class="no-history">No comments yet.</p>';
        return;
    }
    box.innerHTML = t.commentHistory.map(c => `
        <div class="comment-entry">
            <div class="comment-entry-ts">${fmtTs(c.ts)}</div>
            <div class="comment-entry-text">${esc(c.text)}</div>
        </div>`).join('');
    box.scrollTop = box.scrollHeight;
}

function addComment() {
    const inp  = document.getElementById('newCommentInput');
    const text = inp.value.trim();
    if (!text || activeTaskId == null) return;

    const t = tasks.find(t => t.id === activeTaskId);
    if (!t) return;

    if (!t.commentHistory) t.commentHistory = [];
    t.commentHistory.push({ text, ts: Date.now() });
    t.comment = text;   // keep latest in the inline cell too
    inp.value = '';
    autoResize(inp);
    saveData();
    renderCommentHistory(t);

    // Live-update the inline comment textarea & details button
    const row = document.querySelector(`tr[data-id="${activeTaskId}"]`);
    if (row) {
        const ta = row.querySelector('.comment-area');
        if (ta) { ta.value = text; autoResize(ta); }
        const btn = row.querySelector('.btn-details');
        if (btn) btn.classList.add('has-content');
    }
}

function commentKeydown(e) {
    if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); addComment(); }
}

/* ── Notes ── */
function saveNotes() {
    if (activeTaskId == null) return;
    const t = tasks.find(t => t.id === activeTaskId);
    if (!t) return;
    t.notes = document.getElementById('dmNotes').value;
    saveData();
    const btn = document.querySelector(`tr[data-id="${activeTaskId}"] .btn-details`);
    if (btn) {
        const any = (t.commentHistory?.length > 0) || (t.photos?.length > 0) || !!t.notes?.trim();
        btn.classList.toggle('has-content', any);
    }
}

/* ── Photos & Files ── */
function renderPhotosGrid(t) {
    const grid = document.getElementById('photosGrid');
    if (!t.photos?.length) { grid.innerHTML = ''; return; }
    grid.innerHTML = t.photos.map((p, i) => {
        if (p.type === 'image') {
            return `<img class="photo-thumb" src="${p.data}" alt="${esc(p.name)}"
                title="${esc(p.name)}"
                onclick="viewPhoto(${activeTaskId},${i})">`;
        }
        return `<div class="file-chip" onclick="downloadFile(${activeTaskId},${i})" title="${esc(p.name)}">
            📄 <span class="file-chip-name">${esc(p.name)}</span>
        </div>`;
    }).join('');
}

function handleFiles(e) {
    if (activeTaskId == null) return;
    const t = tasks.find(t => t.id === activeTaskId);
    if (!t) return;
    if (!t.photos) t.photos = [];

    const promises = Array.from(e.target.files).map(file => new Promise(res => {
        const reader = new FileReader();
        reader.onload = ev => {
            t.photos.push({
                name: file.name,
                type: file.type.startsWith('image/') ? 'image' : 'file',
                data: ev.target.result,
                ts:   Date.now()
            });
            res();
        };
        reader.readAsDataURL(file);
    }));

    Promise.all(promises).then(() => {
        saveData();
        renderPhotosGrid(t);
        const btn = document.querySelector(`tr[data-id="${activeTaskId}"] .btn-details`);
        if (btn) btn.classList.add('has-content');
        e.target.value = '';
    });
}

function viewPhoto(taskId, idx) {
    const t = tasks.find(t => t.id === taskId);
    if (!t?.photos?.[idx]) return;
    const p = t.photos[idx];
    if (p.type !== 'image') return;
    const w = window.open('', '_blank');
    w.document.write(`<!doctype html><html><body style="margin:0;background:#000;display:flex;
        align-items:center;justify-content:center;min-height:100vh">
        <img src="${p.data}" style="max-width:100%;max-height:100vh;object-fit:contain">
    </body></html>`);
}

function downloadFile(taskId, idx) {
    const t = tasks.find(t => t.id === taskId);
    if (!t?.photos?.[idx]) return;
    const p = t.photos[idx];
    const a = Object.assign(document.createElement('a'), { href: p.data, download: p.name });
    a.click();
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtTs(ts) {
    const d = new Date(ts), p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}  ${p(d.getHours())}:${p(d.getMinutes())}`;
}


/* ══════════════════════════════════════════════
   BACKUP — Save & Load JSON
══════════════════════════════════════════════ */
function saveBackup() {
    const data = {
        version: 3,
        exportedAt: new Date().toISOString(),
        job:      JSON.parse(localStorage.getItem('taskManager_job')      || '[]'),
        personal: JSON.parse(localStorage.getItem('taskManager_personal') || '[]'),
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const date = new Date().toISOString().slice(0,10);
    const a    = Object.assign(document.createElement('a'), {
        href: url, download: 'taskmanager_backup_' + date + '.json'
    });
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ Backup saved!', 'success');
}

function loadBackup(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            if (data.job !== undefined || data.personal !== undefined) {
                if (data.job)      localStorage.setItem('taskManager_job',      JSON.stringify(data.job));
                if (data.personal) localStorage.setItem('taskManager_personal', JSON.stringify(data.personal));
            } else if (Array.isArray(data)) {
                localStorage.setItem('taskManager_job', JSON.stringify(data));
            }
            collapsedSet.clear();
            sortSettings = { col: null, dir: 1 };
            loadData();
            renderTasks();
            showToast('✅ Backup loaded successfully!', 'success');
        } catch(err) {
            showToast('❌ Invalid backup file', 'error');
        }
        e.target.value = '';
    };
    reader.readAsText(file);
}

function showToast(msg, type) {
    type = type || 'success';
    var el = document.getElementById('tm-toast');
    if (!el) {
        el = document.createElement('div');
        el.id = 'tm-toast';
        el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);padding:10px 22px;border-radius:50px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;transition:transform .3s ease,opacity .3s ease;opacity:0;font-family:DM Sans,sans-serif;white-space:nowrap;';
        document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.background = type === 'error' ? '#fee2e2' : '#dcfce7';
    el.style.color      = type === 'error' ? '#991b1b' : '#166534';
    el.style.border     = type === 'error' ? '1px solid #fca5a5' : '1px solid #86efac';
    setTimeout(function() {
        el.style.transform = 'translateX(-50%) translateY(0)';
        el.style.opacity = '1';
    }, 10);
    clearTimeout(el._t);
    el._t = setTimeout(function() {
        el.style.transform = 'translateX(-50%) translateY(70px)';
        el.style.opacity = '0';
    }, 2800);
}
